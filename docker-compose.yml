services:
  api:
    build:
      context: ./apps/api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://legalrag:legalrag@db:5432/legalrag
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: legalrag
      POSTGRES_PASSWORD: legalrag
      POSTGRES_DB: legalrag
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legalrag -d legalrag"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
